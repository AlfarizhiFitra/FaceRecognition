<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — AI Face Attendance</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --navy:      #0F1B2D;
            --navy-card: #1A2E47;
            --teal:      #00D4C8;
            --teal-dim:  rgba(0,212,200,0.12);
            --teal-glow: rgba(0,212,200,0.28);
            --text:      #F0F4F8;
            --muted:     #7A9BB5;
            --border:    rgba(0,212,200,0.18);
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Space Grotesk', sans-serif;
            background: var(--navy); color: var(--text); min-height: 100vh;
            display: flex; align-items: center; justify-content: center; padding: 1.5rem;
        }
        body::before {
            content: ''; position: fixed; inset: 0;
            background-image:
                linear-gradient(rgba(0,212,200,0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,212,200,0.04) 1px, transparent 1px);
            background-size: 52px 52px; pointer-events: none;
        }
        .wrap { width: 100%; max-width: 400px; position: relative; z-index: 1; }

        .brand { text-align: center; margin-bottom: 2rem; }
        .brand-orb {
            width: 64px; height: 64px;
            background: radial-gradient(circle at 40% 40%, rgba(0,212,200,0.25), rgba(0,212,200,0.04));
            border: 1.5px solid rgba(0,212,200,0.45); border-radius: 16px;
            display: inline-flex; align-items: center; justify-content: center;
            font-size: 1.8rem; margin-bottom: 0.9rem;
            box-shadow: 0 0 28px rgba(0,212,200,0.18);
        }
        .brand-name { font-size: 1.2rem; font-weight: 700; letter-spacing: -0.02em; color: var(--teal); }
        .brand-name span { color: var(--text); }
        .brand-sub { font-size: 0.75rem; color: var(--muted); margin-top: 0.2rem; }

        .login-card {
            background: var(--navy-card); border: 1px solid var(--border);
            border-radius: 16px; padding: 2rem;
            box-shadow: 0 12px 48px rgba(0,0,0,0.45);
        }
        .login-title { font-size: 1.1rem; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 0.2rem; }
        .login-sub { font-size: 0.8rem; color: var(--muted); margin-bottom: 1.75rem; }

        .error-box {
            background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3);
            border-radius: 8px; color: #FCA5A5; font-size: 0.82rem;
            padding: 0.6rem 0.9rem; margin-bottom: 1.25rem;
            display: flex; align-items: center; gap: 0.5rem;
        }

        .field { margin-bottom: 1.2rem; }
        .field-label {
            display: block; font-size: 0.72rem; font-weight: 600;
            letter-spacing: 0.08em; text-transform: uppercase;
            color: var(--muted); margin-bottom: 0.5rem;
        }
        .field-input {
            width: 100%; background: rgba(0,0,0,0.3); border: 1px solid var(--border);
            border-radius: 8px; color: var(--text); font-family: 'Space Grotesk', sans-serif;
            font-size: 0.9rem; padding: 0.72rem 1rem;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .field-input::placeholder { color: var(--muted); }
        .field-input:focus { outline: none; border-color: var(--teal); box-shadow: 0 0 0 3px var(--teal-dim); }

        .btn-submit {
            width: 100%; background: var(--teal); color: var(--navy);
            border: none; border-radius: 8px; padding: 0.82rem;
            font-family: 'Space Grotesk', sans-serif; font-size: 0.925rem; font-weight: 700;
            cursor: pointer; box-shadow: 0 0 20px var(--teal-glow); margin-top: 0.5rem;
            transition: all 0.2s;
        }
        .btn-submit:hover { background: #00bfb4; box-shadow: 0 0 36px rgba(0,212,200,0.45); transform: translateY(-1px); }
        .btn-submit:active { transform: translateY(0); }
    </style>
</head>
<body>
    <div class="wrap">
        <div class="brand">
            <div class="brand-orb">🎯</div>
            <div class="brand-name"><span>AI</span> Face Attendance</div>
            <div class="brand-sub">Sistem Presensi Berbasis Face Recognition</div>
        </div>

        <div class="login-card">
            <div class="login-title">Masuk ke Sistem</div>
            <div class="login-sub">Khusus administrator yang berwenang</div>

            {% if error %}
            <div class="error-box">⚠️ {{ error }}</div>
            {% endif %}

            <form method="POST">
                <div class="field">
                    <label class="field-label" for="username">Username</label>
                    <input type="text" id="username" name="username" class="field-input" placeholder="Masukkan username" required>
                </div>
                <div class="field">
                    <label class="field-label" for="password">Password</label>
                    <input type="password" id="password" name="password" class="field-input" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn-submit">Masuk →</button>
            </form>
        </div>
    </div>
</body>
</html>
